<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading… — SharePoint &amp; Power Platform Interview Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e14;
    --surface:#111823;
    --border:#232f3d;
    --border-bright:#324357;
    --text:#e7edf4;
    --text-muted:#8b9bad;
    --text-dim:#5c6b7d;
    --accent:#35d0ba;
    --accent-soft:rgba(53,208,186,0.12);
    --beginner:#4ade80;
    --intermediate:#5b9dfc;
    --advanced:#f5a623;
    --expert:#f2685c;
    --mono:'JetBrains Mono', ui-monospace, monospace;
    --sans:'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(53,208,186,0.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent);}
  :focus-visible{outline:2px solid var(--accent); outline-offset:3px; border-radius:4px;}
  .wrap{max-width:860px; margin:0 auto; padding:0 24px;}

  /* Top bar */
  .topbar{
    position:sticky; top:0; z-index:10;
    background:rgba(10,14,20,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .topbar-inner{
    max-width:860px; margin:0 auto; padding:16px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
  }
  .back-link{
    font-family:var(--mono);
    font-size:13px;
    color:var(--text-muted);
    text-decoration:none;
    display:flex; align-items:center; gap:6px;
    white-space:nowrap;
  }
  .back-link:hover{color:var(--accent);}
  .source-link{
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-dim);
    text-decoration:none;
    border:1px solid var(--border);
    padding:5px 11px;
    border-radius:20px;
    white-space:nowrap;
    transition:border-color .15s ease, color .15s ease;
  }
  .source-link:hover{color:var(--accent); border-color:var(--accent);}

  /* Progress bar while loading */
  #progress{
    position:fixed; top:0; left:0; height:2px; width:0%;
    background:var(--accent); transition:width .3s ease; z-index:20;
  }

  /* Markdown content styling */
  article#content{
    padding:44px 0 90px;
    font-size:15.5px;
  }
  article#content > *:first-child{margin-top:0;}

  #content h1{
    font-family:var(--mono);
    font-weight:700;
    font-size:clamp(24px, 4vw, 34px);
    line-height:1.2;
    letter-spacing:-0.01em;
    margin:0 0 6px;
  }
  #content > p:first-of-type{
    /* the nav line right under h1 */
    font-family:var(--mono);
    font-size:12.5px;
    color:var(--text-dim);
    margin:0 0 28px;
    padding-bottom:22px;
    border-bottom:1px solid var(--border);
  }
  #content > p:first-of-type a{color:var(--text-muted); text-decoration:none;}
  #content > p:first-of-type a:hover{color:var(--accent);}

  #content h2{
    font-family:var(--mono);
    font-weight:700;
    font-size:20px;
    margin:46px 0 18px;
    padding-top:6px;
    color:var(--text);
    scroll-margin-top:80px;
  }
  #content h2:first-of-type{margin-top:8px;}

  #content ul{
    padding-left:20px;
    margin:0 0 28px;
  }
  #content ul li{margin-bottom:7px; color:var(--text-muted);}
  #content ul li a{color:var(--accent);}

  #content p{
    color:var(--text-muted);
    margin:0 0 20px;
  }
  #content p strong{
    color:var(--text);
    font-weight:600;
  }
  /* Q/A and Scenario blocks: consecutive bold-led paragraphs get a card treatment */
  #content p:has(> strong:first-child){
    background:var(--surface);
    border:1px solid var(--border);
    border-left:3px solid var(--accent);
    border-radius:10px;
    padding:16px 20px;
    margin-bottom:14px;
  }
  #content h2 + p:has(> strong:first-child),
  #content ul + p:has(> strong:first-child){
    margin-top:0;
  }

  #content code{
    font-family:var(--mono);
    background:rgba(255,255,255,0.06);
    padding:2px 6px;
    border-radius:4px;
    font-size:0.9em;
    color:var(--accent);
  }
  #content hr{
    border:none;
    border-top:1px solid var(--border);
    margin:36px 0;
  }
  #content a{text-decoration:none; border-bottom:1px solid rgba(53,208,186,0.35);}
  #content a:hover{border-color:var(--accent);}

  .loading-state{
    padding:80px 0;
    text-align:center;
    color:var(--text-dim);
    font-family:var(--mono);
    font-size:13px;
  }
  .error-state{
    padding:60px 0;
    text-align:center;
    color:var(--expert);
    font-family:var(--mono);
    font-size:13.5px;
  }

  footer.page-footer{
    border-top:1px solid var(--border);
    padding:28px 0 60px;
    color:var(--text-dim);
    font-size:12.5px;
    font-family:var(--mono);
    text-align:center;
  }
  footer.page-footer a{color:var(--text-muted);}
  footer.page-footer a:hover{color:var(--accent);}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

<div id="progress"></div>

<div class="topbar">
  <div class="topbar-inner">
    <a class="back-link" href="index.html">&larr; All topics</a>
    <a class="source-link" id="source-link" href="#" target="_blank" rel="noopener">View source on GitHub &#8599;</a>
  </div>
</div>

<div class="wrap">
  <article id="content">
    <div class="loading-state">Loading topic…</div>
  </article>
</div>

<footer class="page-footer">
  <a href="index.html">&larr; Back to the full index</a>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const fileKey = (params.get('t') || '01-sharepoint').replace(/[^a-z0-9-]/gi, '');
  const mdPath = `topics/${fileKey}.md`;
  const REPO_BLOB = `https://github.com/Rahul7387/sharepoint-power-platform-interview-questions/blob/main/topics/${fileKey}.md`;

  document.getElementById('source-link').setAttribute('href', REPO_BLOB);

  const progress = document.getElementById('progress');
  progress.style.width = '30%';

  fetch(mdPath)
    .then(res => {
      if (!res.ok) throw new Error(`Could not load ${mdPath} (${res.status})`);
      return res.text();
    })
    .then(md => {
      progress.style.width = '75%';

      // Page title from first "# " heading
      const titleMatch = md.match(/^#\s+(.+)$/m);
      if (titleMatch) {
        document.title = `${titleMatch[1]} — SharePoint & Power Platform Interview Prep`;
      }

      marked.setOptions({ breaks: true, gfm: true });
      const html = marked.parse(md);
      const contentEl = document.getElementById('content');
      contentEl.innerHTML = html;

      // Recreate GitHub-style heading slugs so the in-page Table of Contents
      // (e.g. "🟢 Beginner" -> #-beginner) actually scrolls to the right section.
      function slugify(text) {
        return text
          .replace(/[^\w\s-]/g, '')
          .toLowerCase()
          .replace(/\s+/g, '-');
      }
      contentEl.querySelectorAll('h2').forEach(h => {
        if (!h.id) h.id = slugify(h.textContent);
      });

      // Rewrite internal links so navigation stays on-site instead of going to GitHub
      contentEl.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href') || '';

        // Links to other topic markdown files -> topic.html?t=<name>
        const topicMatch = href.match(/(\d{2}-[a-z0-9-]+)\.md(?:#.*)?$/i);
        if (topicMatch) {
          a.setAttribute('href', `topic.html?t=${topicMatch[1]}`);
          return;
        }
        // Links to the index page (however written) -> local index.html
        if (/index\.html$/i.test(href)) {
          a.setAttribute('href', 'index.html');
          return;
        }
        // Links to the repo README -> open the actual repo on GitHub
        if (/README\.md$/i.test(href)) {
          a.setAttribute('href', 'https://github.com/Rahul7387/sharepoint-power-platform-interview-questions#readme');
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener');
          return;
        }
        // Anything else (external http links, in-page #anchors) is left as-is
      });

      progress.style.width = '100%';
      setTimeout(() => { progress.style.opacity = '0'; }, 400);
    })
    .catch(err => {
      document.getElementById('content').innerHTML =
        `<div class="error-state">Couldn't load this topic.<br>${err.message}<br><br><a href="index.html">&larr; Back to index</a></div>`;
      progress.style.opacity = '0';
    });
</script>

</body>
</html>
